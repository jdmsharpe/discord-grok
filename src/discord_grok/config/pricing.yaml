# xAI Grok pricing catalog.
#
# Canonical source: https://docs.x.ai/docs/models
# Long-context tiers: per-model pages at https://docs.x.ai/developers/models/<model>
# Cross-referenced against: https://github.com/pydantic/genai-prices/blob/main/prices/providers/x_ai.yml
# Last-verified: 2026-07-16
#
# Chat pricing is organized by pricing class (premium / fast / mini / etc.).
# The model → class mapping lives in command_options.py alongside the catalog;
# this file owns only the class → price mapping so several models can share
# identical pricing without duplication.
#
# Override this file at runtime by setting XAI_PRICING_PATH to an alternate
# YAML path — useful for pushing new pricing without a code release.

# Per-million-token triples: (input, cached_input, output)
#
# Classes with a `long_context` block have a second pricing tier: per docs.x.ai,
# "Requests whose prompt reaches 200k tokens are billed at the higher rate for
# all tokens in the request" — so once a request's PROMPT token count reaches
# threshold_tokens, ALL of its tokens (input, cached input, and output) bill at
# the long_context rates, not just the overflow. Classes without the block bill
# flat at any prompt size.
pricing_classes:
  flagship:
    input_per_million: 1.25
    cached_input_per_million: 0.20
    output_per_million: 2.50
    long_context: { threshold_tokens: 200000, input_per_million: 2.50, cached_input_per_million: 0.40, output_per_million: 5.00 }
  # grok-4.5 caches at $0.50/M — 2.5x the $0.20 every other class uses — so it cannot
  # share `premium` despite matching its $2.00/$6.00 input/output.
  grok_4_5:
    input_per_million: 2.00
    cached_input_per_million: 0.50
    output_per_million: 6.00
    long_context: { threshold_tokens: 200000, input_per_million: 4.00, cached_input_per_million: 1.00, output_per_million: 12.00 }
  premium:        { input_per_million: 2.00, cached_input_per_million: 0.20, output_per_million: 6.00 }
  build:
    input_per_million: 1.00
    cached_input_per_million: 0.20
    output_per_million: 2.00
    long_context: { threshold_tokens: 200000, input_per_million: 2.00, cached_input_per_million: 0.40, output_per_million: 4.00 }
  fast:           { input_per_million: 0.20, cached_input_per_million: 0.05, output_per_million: 0.50 }
  code_fast:      { input_per_million: 0.20, cached_input_per_million: 0.02, output_per_million: 1.50 }
  legacy_premium: { input_per_million: 3.00, cached_input_per_million: 0.75, output_per_million: 15.00 }
  mini:           { input_per_million: 0.30, cached_input_per_million: 0.075, output_per_million: 0.50 }

# Flat per-image pricing for Grok Imagine models.
# grok-imagine-image-pro is an alias of grok-imagine-image-quality (canonical);
# the row is kept for cost continuity of past requests, at the corrected price.
image_generation:
  grok-imagine-image-quality: { per_image: 0.05 }
  grok-imagine-image-pro:     { per_image: 0.05 }
  grok-imagine-image:         { per_image: 0.02 }

# Per-second pricing for Grok Imagine video models.
video_generation:
  grok-imagine-video:             { per_second: 0.05 }
  grok-imagine-video-1.5-preview: { per_second: 0.08 }

# Text-to-speech is charged per million characters.
text_to_speech:
  per_million_chars: 15.00

# Server-side tool invocation pricing (dollars per 1,000 invocations).
tools:
  SERVER_SIDE_TOOL_WEB_SEARCH:         { per_1k_invocations: 5.00 }
  SERVER_SIDE_TOOL_X_SEARCH:           { per_1k_invocations: 5.00 }
  SERVER_SIDE_TOOL_CODE_EXECUTION:     { per_1k_invocations: 5.00 }
  SERVER_SIDE_TOOL_CODE_INTERPRETER:   { per_1k_invocations: 5.00 }
  SERVER_SIDE_TOOL_COLLECTIONS_SEARCH: { per_1k_invocations: 2.50 }
  SERVER_SIDE_TOOL_FILE_SEARCH:        { per_1k_invocations: 2.50 }
  SERVER_SIDE_TOOL_ATTACHMENT_SEARCH:  { per_1k_invocations: 10.00 }

fallbacks:
  unknown_image_model: { per_image: 0.05 }
  unknown_video_model: { per_second: 0.08 }
